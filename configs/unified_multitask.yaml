seed: 42

data:
  manifests_dir: data/processed/manifests
  docking_manifest: rnamigos_docking_manifest.csv
  binary_manifest: rnamigos_binary_manifest.csv
  decoy_manifest: rnamigos_ligand_decoy_manifest.csv
  site_manifest: rnamigos_pocket_nodes_manifest.csv
  max_rna_tokens: 64
  max_lig_tokens: 48

featurizer:
  mode: real

model:
  embed_dim: 128
  num_heads: 4
  dropout: 0.1

train:
  batch_size: 16
  epochs: 3
  lr: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 1.0
  negatives_per_positive: 4

loss:
  lambda_rank: 1.0
  lambda_dock: 0.5
  lambda_site: 0.5
  contrastive_temperature: 0.2

schedule:
  phase1_epochs: 1
  phase2_epochs: 1
  phase3_epochs: 1

output:
  checkpoint_dir: outputs/checkpoints
  log_every: 20
